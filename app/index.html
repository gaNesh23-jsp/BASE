<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #2563eb;
        }

        .status {
            background-color: #d1fae5;
            color: #065f46;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media(max-width:768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #2563eb;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .lookup-row {
            display: flex;
            gap: 10px;
        }

        .lookup-row input {
            margin-bottom: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #2563eb;
            color: white;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .delete-btn {
            background-color: #ef4444;
        }

        .delete-btn:hover {
            background-color: #dc2626;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111827;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            display: none;
        }

        .result-box {
            margin-top: 15px;
            background: #eef2ff;
            padding: 12px;
            border-radius: 6px;
        }

        .debug {
            background: #fff7ed;
            padding: 12px;
            border-left: 4px solid orange;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>PRODUCT MANAGEMENT</h1>
            <div class="status" id="statusText">
                API Checking...
            </div>
        </div>

        <!-- <div class="debug">
            <strong>API Debug:</strong>
            <div id="debugInfo">Testing connection...</div>
        </div> -->

        <div class="grid">

            <!-- Add Product -->
            <div class="card">
                <h3>Add Product</h3>

                <input type="text" id="productName" placeholder="Product Name">

                <input type="text" id="productDesc" placeholder="Description">

                <input type="number" id="productPrice" placeholder="Price">

                <input type="number" id="productStock" placeholder="Stock">

                <button id="createBtn">Create Product</button>
            </div>

            <!-- Lookup -->
            <div class="card">
                <h3>Lookup Product</h3>

                <div class="lookup-row">
                    <input type="number" id="lookupId" placeholder="Enter Product ID">
                    <button id="fetchBtn">Fetch</button>
                </div>

                <div id="lookupResult"></div>
            </div>

        </div>

        <!-- Table -->
        <div class="card">

            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3>Inventory</h3>
                <button id="refreshBtn">Refresh</button>
            </div>

            <div style="overflow-x:auto;">
                <table>

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" style="text-align:center;">Loading...</td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

    <div class="toast" id="toast">
        <span id="toastMsg"></span>
    </div>

    <script>

        const API_BASE = 'http://127.0.0.1:8000';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;

            toast.style.display = 'block';

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function testAPI() {

            try {

                const response = await fetch(`${API_BASE}/products`);

                if (response.ok) {

                    document.getElementById('statusText').textContent = 'API Online';
                    document.getElementById('debugInfo').textContent =
                        'Connected successfully';

                } else {

                    document.getElementById('statusText').textContent = 'API Error';

                }

            } catch (err) {

                document.getElementById('statusText').textContent = 'API Offline';

                document.getElementById('debugInfo').textContent =
                    'Cannot connect to backend';

            }

        }

        async function loadProducts() {

            try {

                const response = await fetch(`${API_BASE}/products`);

                const products = await response.json();

                const tbody = document.getElementById('tableBody');

                if (products.length === 0) {

                    tbody.innerHTML =
                        `<tr><td colspan="6" style="text-align:center;">No Products</td></tr>`;

                    return;
                }

                tbody.innerHTML = products.map(p => `

                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.description || '-'}</td>
                        <td>₹${p.price}</td>
                        <td>${p.stock}</td>
                        <td>
                            <button class="delete-btn"
                                onclick="deleteProduct(${p.id})">
                                Delete
                            </button>
                        </td>
                    </tr>

                `).join('');

            } catch (err) {

                document.getElementById('tableBody').innerHTML =
                    `<tr><td colspan="6">Failed to load products</td></tr>`;

            }

        }

        async function createProduct() {

            const name = document.getElementById('productName').value;
            const description = document.getElementById('productDesc').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;

            if (!name || !price || !stock) {
                showToast('Fill all required fields');
                return;
            }

            try {

                const response = await fetch(`${API_BASE}/products`, {

                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        name,
                        description,
                        price,
                        stock
                    })

                });

                if (response.ok) {

                    showToast('Product Created');

                    loadProducts();

                } else {

                    showToast('Error creating product');

                }

            } catch (err) {

                showToast('API Error');

            }

        }

        async function fetchProduct() {

            const id = document.getElementById('lookupId').value;

            if (!id) return;

            try {

                const response = await fetch(`${API_BASE}/products/${id}`);

                const result = document.getElementById('lookupResult');

                if (response.ok) {

                    const p = await response.json();

                    result.innerHTML = `
                    
                        <div class="result-box">
                            <strong>ID:</strong> ${p.id}<br>
                            <strong>Name:</strong> ${p.name}<br>
                            <strong>Description:</strong> ${p.description}<br>
                            <strong>Price:</strong> ₹${p.price}<br>
                            <strong>Stock:</strong> ${p.stock}
                        </div>

                    `;

                } else {

                    result.innerHTML =
                        `<div class="result-box">Product not found</div>`;

                }

            } catch (err) {

                showToast('API Error');

            }

        }

        async function deleteProduct(id) {

            if (!confirm('Delete this product?')) return;

            try {

                const response = await fetch(`${API_BASE}/products/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {

                    showToast('Product Deleted');

                    loadProducts();

                }

            } catch (err) {

                showToast('Delete Failed');

            }

        }

        document.getElementById('createBtn').onclick = createProduct;
        document.getElementById('fetchBtn').onclick = fetchProduct;
        document.getElementById('refreshBtn').onclick = loadProducts;

        testAPI();
        loadProducts();

    </script>

</body>

</html>
